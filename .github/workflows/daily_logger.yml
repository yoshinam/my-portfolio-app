name: Daily Japan Stock Logger

on:
  schedule:
    # 毎日日本時間の夜23:00（UTC 14:00）に実行
    - cron: '0 14 * * *'
  workflow_dispatch: # GitHubの画面から手動でいつでも動かせるボタンを作る設定

jobs:
  run-logger:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリのインストール
      run: |
        pip install yfinance requests

    - name: Pythonスクリプトの実行
      env:
        GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
      run: |
        python record_data.py
